<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Regular Meats</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Montserrat:wght@400;600;700;800&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: #0d0d0d;
      color: #f5f1e8;
      font-family: 'Montserrat', Arial, sans-serif;
      padding: 20px 12px;
    }

    .page {
      max-width: 1050px;
      margin: auto;
      padding: 28px 20px;
      background: #121212;
      border: 1px solid rgba(212, 175, 55, 0.28);
      border-radius: 24px;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 16px;
    }

    .logo-area img {
      width: 330px;
      max-width: 90%;
    }

    .back-link {
      display: inline-block;
      color: #d4af37;
      text-decoration: none;
      font-weight: 800;
      margin-bottom: 18px;
    }

    h1, h2 {
      font-family: 'Cinzel', Georgia, serif;
      text-transform: uppercase;
      letter-spacing: 4px;
      text-align: center;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: #a8a29e;
      font-size: 14px;
      margin-bottom: 24px;
    }

    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, #d4af37, transparent);
      margin: 22px 0;
    }

    .meat-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .meat-card {
      background: linear-gradient(145deg, #101010, #181818);
      border: 1px solid rgba(212, 175, 55, 0.25);
      border-radius: 16px;
      padding: 18px;
    }

    .meat-card h2 {
      text-align: left;
      font-size: 21px;
      color: #f5f1e8;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }

    .meat-card p {
      color: #b8b1a7;
      font-size: 13px;
      line-height: 1.5;
    }

    .tag {
      display: inline-block;
      margin-top: 10px;
      color: #d4af37;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    @media (max-width: 720px) {
      .meat-grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 30px;
      }

      .logo-area img {
        width: 280px;
      }
    }
  </style>
</head>

<body>
  <main class="page">

    <a class="back-link" href="index.html">← Back to Main Menu</a>

    <div class="logo-area">
      <img src="logo.png" alt="Boiling Pot & Boba Street Logo">
    </div>

    <h1>Regular Meats</h1>
    <p class="subtitle">Included with the Regular All You Can Eat level.</p>

    <div class="divider"></div>

    <section class="meat-grid">

      <div class="meat-card">
        <h2>Sliced Lamb Shoulder</h2>
        <p>Tender sliced lamb with a rich, savory flavor.</p>
        <span class="tag">Included</span>
      </div>

      <div class="meat-card">
        <h2>Angus Beef</h2>
        <p>Classic hot pot beef with balanced marbling and flavor.</p>
        <span class="tag">Included</span>
      </div>

      <div class="meat-card">
        <h2>Jumbo Shrimp</h2>
        <p>Served with shell and head.</p>
        <span class="tag">Included</span>
      </div>

    </section>

  </main>
</body>
</html>
